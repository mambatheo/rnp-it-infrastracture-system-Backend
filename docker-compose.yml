version: "3.9"

# ── Shared backend environment ────────────────────────────────────────────────
x-backend-env: &backend-env
  env_file: .env
  environment:
    POSTGRES_DB:       ${POSTGRES_DB:-itinfra}
    DB_HOST:            db
    DB_PORT:             "5432"      
    POSTGRES_USER:     ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}   
    REDIS_BROKER_URL:      redis://redis:6379/0
    REDIS_RESULT_URL:      redis://redis:6379/1
    REDIS_CACHE_URL:       redis://redis:6379/2
    DJANGO_SETTINGS_MODULE: itinfra.settings
    DEBUG: "False"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-itinfra}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (broker + cache + results) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django + Gunicorn ────────────────────────────────────────────────────────
  web:
    build:
      context: .          # backend repo root
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - media_data:/app/media

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    command: >
      celery -A itinfra worker
      -l info
      -Q celery,prewarm
      --pool=prefork
      --concurrency=4

  # ── Celery Beat (scheduler — only ONE instance ever) ─────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A itinfra beat
      -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Nginx + React Frontend ────────────────────────────────────────────────────
  # Build context points to the frontend repo cloned as a sibling directory.
  # Server layout expected:
  #   /opt/itinfra/backend/   ← this repo (docker-compose.yml lives here)
  #   /opt/itinfra/frontend/  ← frontend repo (only Dockerfile needed there)
  nginx:
    build:
      context: ../frontend    # ← sibling frontend repo directory
      dockerfile: Dockerfile
      args:
        # Must match your server IP or domain — baked into the React bundle
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://itinfra-server}
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      # Reuse the existing nginx.conf from this backend repo — no duplicate needed
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:   # PostgreSQL — never delete this volume
  redis_data:      # Redis persistence
  media_data:      # Uploaded media files (local, no cloud)
