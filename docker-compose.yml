version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Fall back defaults if not provided in .env
      POSTGRES_DB: ${POSTGRES_DB:-itinfra}
      POSTGRES_USER: ${POSTGRES_USER:-itinfra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Used by the frontend build stage; adjust to your public API URL
        # HTTP-only by default (set your real host in .env before building)
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://api.example.com}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Example defaults for local Docker; override in .env for production.
      DATABASE_URL: ${DATABASE_URL:-postgresql://itinfra:changeme@db:5432/itinfra}
      REDIS_BROKER_URL: ${REDIS_BROKER_URL:-redis://redis:6379/0}
      REDIS_RESULT_URL: ${REDIS_RESULT_URL:-redis://redis:6379/1}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
      DJANGO_SETTINGS_MODULE: itinfra.settings
      DEBUG: "False"
    depends_on:
      - db
      - redis
    expose:
      - "8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://itinfra:changeme@db:5432/itinfra}
      REDIS_BROKER_URL: ${REDIS_BROKER_URL:-redis://redis:6379/0}
      REDIS_RESULT_URL: ${REDIS_RESULT_URL:-redis://redis:6379/1}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
      DJANGO_SETTINGS_MODULE: itinfra.settings
    depends_on:
      - db
      - redis
    command: >
      celery -A itinfra worker
      -l info
      -Q celery,prewarm
      --pool=solo
      --concurrency=1

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://itinfra:changeme@db:5432/itinfra}
      REDIS_BROKER_URL: ${REDIS_BROKER_URL:-redis://redis:6379/0}
      REDIS_RESULT_URL: ${REDIS_RESULT_URL:-redis://redis:6379/1}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
      DJANGO_SETTINGS_MODULE: itinfra.settings
    depends_on:
      - db
      - redis
    command: >
      celery -A itinfra beat
      -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx-static
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      # Nginx config with API proxy + optional static
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # Expose HTTP on the Ubuntu host (no TLS for this deployment).
      - "80:80"
    # If you want Nginx to serve Django static/media directly from the container,
    # you can mount a volume from web here and update nginx.conf accordingly.

volumes:
  postgres_data:
  redis_data:

