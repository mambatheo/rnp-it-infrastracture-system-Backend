version: "3.9"

services:

  # ── PostgreSQL (self-hosted, data persisted in named volume) ─────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-itinfra}
      POSTGRES_USER:     ${POSTGRES_USER:-itinfra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itinfra}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (broker + cache + results — all self-hosted) ───────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django + Gunicorn ────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the React build — set to your server's IP or domain
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL:          ${DATABASE_URL:-postgresql://itinfra:changeme@db:5432/itinfra}
      REDIS_BROKER_URL:      redis://redis:6379/0
      REDIS_RESULT_URL:      redis://redis:6379/1
      REDIS_CACHE_URL:       redis://redis:6379/2
      DJANGO_SETTINGS_MODULE: itinfra.settings
      DEBUG:                 "False"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      # Media files (user uploads, profile photos, etc.) persisted locally
      - media_data:/app/media

  # ── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL:          ${DATABASE_URL:-postgresql://itinfra:changeme@db:5432/itinfra}
      REDIS_BROKER_URL:      redis://redis:6379/0
      REDIS_RESULT_URL:      redis://redis:6379/1
      REDIS_CACHE_URL:       redis://redis:6379/2
      DJANGO_SETTINGS_MODULE: itinfra.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    # prefork = proper Linux multi-process (replaces Windows --pool=solo)
    command: >
      celery -A itinfra worker
      -l info
      -Q celery,prewarm
      --pool=prefork
      --concurrency=4

  # ── Celery Beat (scheduler — only ONE instance ever) ─────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL:          ${DATABASE_URL:-postgresql://itinfra:changeme@db:5432/itinfra}
      REDIS_BROKER_URL:      redis://redis:6379/0
      REDIS_RESULT_URL:      redis://redis:6379/1
      REDIS_CACHE_URL:       redis://redis:6379/2
      DJANGO_SETTINGS_MODULE: itinfra.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A itinfra beat
      -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Nginx (React SPA + reverse proxy to Django) ──────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx-static
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:   # PostgreSQL data — never delete this
  redis_data:      # Redis persistence
  media_data:      # User-uploaded media files (local, no cloud)

